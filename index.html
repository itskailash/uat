<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Deployment Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .message-box {
            text-align: center;
            padding: 40px;
            background-color: #e6ffe6;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        .message-box h1 {
            color: #4CAF50;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .message-box p {
            color: #333;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>Deployment Successful!</h1>
        <p>Your CI/CD pipeline has successfully deployed this page.</p>
    </div>
</body>
</html>
